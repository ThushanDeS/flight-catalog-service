openapi: 3.0.0
info:
  title: Flight Catalog Service API
  description: Microservice for managing flight information, schedules, and seat availability
  version: 1.0.0
  contact:
    name: Student A - Flight Catalog Service
  license:
    name: MIT

servers:
  - url: http://localhost:5001
    description: Local development server
  - url: https://flight-catalog.azurecontainerapps.io
    description: Production server

tags:
  - name: Flights
    description: Flight management endpoints
  - name: System
    description: System health and information

paths:
  /health:
    get:
      tags:
        - System
      summary: Health check endpoint
      description: Returns the health status of the service and its dependencies
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is degraded

  /api/flights:
    get:
      tags:
        - Flights
      summary: Get all flights
      description: Retrieve a list of all flights with optional filtering
      parameters:
        - name: origin
          in: query
          schema:
            type: string
          description: Filter by origin airport code (e.g., JFK)
        - name: destination
          in: query
          schema:
            type: string
          description: Filter by destination airport code (e.g., LAX)
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Filter by departure date (YYYY-MM-DD)
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number for pagination
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: Number of items per page
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightsResponse'
        '500':
          description: Server error

    post:
      tags:
        - Flights
      summary: Create a new flight
      description: Add a new flight to the catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlightInput'
      responses:
        '201':
          description: Flight created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Flight'
        '400':
          description: Invalid input
        '500':
          description: Server error

  /api/flights/{flightId}:
    get:
      tags:
        - Flights
      summary: Get flight by ID
      description: Retrieve detailed information about a specific flight
      parameters:
        - name: flightId
          in: path
          required: true
          schema:
            type: string
          description: MongoDB ObjectId of the flight
      responses:
        '200':
          description: Flight details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Flight'
        '404':
          description: Flight not found
        '500':
          description: Server error

  /api/flights/{flightId}/seats:
    patch:
      tags:
        - Flights
      summary: Update available seats
      description: Update the number of available seats (used by Booking Service)
      parameters:
        - name: flightId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - seatsToDeduct
              properties:
                seatsToDeduct:
                  type: integer
                  minimum: 1
                  description: Number of seats to deduct
      responses:
        '200':
          description: Seats updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: Not enough seats available
        '404':
          description: Flight not found
        '500':
          description: Server error

  /api/flights/search:
    get:
      tags:
        - Flights
      summary: Search flights
      description: Search for flights by origin and destination
      parameters:
        - name: origin
          in: query
          required: true
          schema:
            type: string
          description: Origin airport code
        - name: destination
          in: query
          required: true
          schema:
            type: string
          description: Destination airport code
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Departure date (YYYY-MM-DD)
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Flight'
        '400':
          description: Missing required parameters
        '500':
          description: Server error

components:
  schemas:
    Flight:
      type: object
      properties:
        _id:
          type: string
          description: MongoDB ObjectId
        flightNumber:
          type: string
          example: "AA789"
        airline:
          type: string
          example: "American Airlines"
        origin:
          type: string
          example: "JFK"
        destination:
          type: string
          example: "LAX"
        departureTime:
          type: string
          format: date-time
          example: "2026-04-15T10:30:00Z"
        arrivalTime:
          type: string
          format: date-time
          example: "2026-04-15T13:45:00Z"
        availableSeats:
          type: integer
          example: 42
        price:
          type: number
          format: float
          example: 299.99
        departureDate:
          type: string
          format: date
          example: "2026-04-15"

    FlightInput:
      type: object
      required:
        - flightNumber
        - origin
        - destination
        - departureTime
        - arrivalTime
        - availableSeats
        - price
      properties:
        flightNumber:
          type: string
          example: "AA789"
        airline:
          type: string
          example: "American Airlines"
        origin:
          type: string
          example: "JFK"
        destination:
          type: string
          example: "LAX"
        departureTime:
          type: string
          format: date-time
          example: "2026-04-15T10:30:00Z"
        arrivalTime:
          type: string
          format: date-time
          example: "2026-04-15T13:45:00Z"
        availableSeats:
          type: integer
          example: 42
        price:
          type: number
          format: float
          example: 299.99

    FlightsResponse:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        flights:
          type: array
          items:
            $ref: '#/components/schemas/Flight'

    HealthResponse:
      type: object
      properties:
        service:
          type: string
        status:
          type: string
          enum: [healthy, degraded]
        version:
          type: string
        timestamp:
          type: string
          format: date-time
        database:
          type: object
          properties:
            connected:
              type: boolean
            collections:
              type: integer